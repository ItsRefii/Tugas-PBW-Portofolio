<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOTS GREENTEA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1> Selamat Datang di DOTS Greentea</h1>
    </header>



    <nav>
        <ul>
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Tentang</a></li>
            <li><a href="#">Layanan</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
    </nav>


    <div class="container">
        <section class="content">
            <h2>DOTS</h2>
            <p>Rasakan harmoni cita rasa matcha terbaik yang disajikan dengan penuh cinta. Temukan kehangatan dalam setiap tegukan!</p>
                <img src="img/fotokafedalem.png" class="foto1">
                <img src="img/fotokafeluar.png" class="foto2">

            <button class="btn">Klik Saya</button>
        </section>

        <aside class="sidebar">
            <h2>RESERVASI DISINI</h2>
                <form action="#" method="post">
                
                <label>Nama Lengkap</label>
                <input type="text" name="nama" required>

                <label>Email</label>
                <input type="email" name="email" required>

                <label>Nomor Telepon</label>
                <input type="tel" name="telepon" required>

                <label>Tanggal Reservasi</label>
                <input type="date" name="tanggal" required>

                <label>Catatan Tambahan</label>
                <textarea name="catatan" rows="3"></textarea>

                <button type="submit">Kirim Reservasi</button>

            </form>
        </aside>
    </div>

    <footer>
        <p>&copy; 2026 Halaman Web DOTS Greentea, dibuat dengan CSS</p>
    </footer>
</body>
</html>
